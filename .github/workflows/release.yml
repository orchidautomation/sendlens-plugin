name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sendlens-production-release
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

jobs:
  release-state:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.version.outputs.release_needed }}
      release_requires_promotion: ${{ steps.version.outputs.release_requires_promotion }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      package_version: ${{ steps.version.outputs.package_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release state
        id: version
        run: node scripts/release-state.mjs

  github-release:
    needs: release-state
    if: needs.release-state.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Pluxx CLI is available
        run: npx pluxx --version

      - name: Run Pluxx source diagnostics
        run: npx pluxx doctor

      - name: Run release checks
        run: npm run release:check

      - name: Run full Pluxx target release gate
        run: npx pluxx test --target claude-code cursor codex opencode

      - name: Diagnose built host bundles
        env:
          SENDLENS_INSTANTLY_API_KEY: ci-placeholder
        run: |
          npx pluxx doctor --consumer ./dist/claude-code
          npx pluxx doctor --consumer ./dist/cursor
          npx pluxx doctor --consumer ./dist/codex
          npx pluxx doctor --consumer ./dist/opencode

      - name: Dry-run GitHub release assets with Pluxx
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx pluxx publish --github-release --dry-run --version "${{ needs.release-state.outputs.package_version }}"

      - name: Create release tag
        if: needs.release-state.outputs.tag_exists == 'false'
        run: |
          git tag "${{ needs.release-state.outputs.tag_name }}" "${GITHUB_SHA}"
          git push origin "${{ needs.release-state.outputs.tag_name }}"

      - name: Publish GitHub release assets with Pluxx
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx pluxx publish --github-release --version "${{ needs.release-state.outputs.package_version }}"

      - name: Publish draft release when needed
        if: needs.release-state.outputs.release_requires_promotion == 'true'
        run: |
          gh release edit "${{ needs.release-state.outputs.tag_name }}" --draft=false --prerelease=false --latest

      - name: Verify GitHub release is published
        run: |
          test "$(gh release view "${{ needs.release-state.outputs.tag_name }}" --json isDraft,isPrerelease --jq '[.isDraft, .isPrerelease] | join(",")')" = "false,false"
