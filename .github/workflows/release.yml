name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: sendlens-production-release
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-state:
    runs-on: ubuntu-latest
    outputs:
      release_needed: ${{ steps.version.outputs.release_needed }}
      tag_exists: ${{ steps.version.outputs.tag_exists }}
      package_version: ${{ steps.version.outputs.package_version }}
      tag_name: ${{ steps.version.outputs.tag_name }}
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve release state
        id: version
        shell: bash
        run: |
          set -euo pipefail

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          LOCK_VERSION="$(node -p "require('./package-lock.json').version")"
          LOCK_ROOT_VERSION="$(node -p "require('./package-lock.json').packages[''].version")"
          TAG_NAME="v${PACKAGE_VERSION}"

          echo "package_version=${PACKAGE_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"

          if [ "${PACKAGE_VERSION}" != "${LOCK_VERSION}" ] || [ "${PACKAGE_VERSION}" != "${LOCK_ROOT_VERSION}" ]; then
            echo "package.json and package-lock.json versions must match before release" >&2
            exit 1
          fi

          IS_DRAFT="$(gh release view "${TAG_NAME}" --json isDraft --jq '.isDraft' 2>/dev/null || true)"
          if [ "${IS_DRAFT}" = "false" ]; then
            echo "Release ${TAG_NAME} already exists; this push does not need a release."
            echo "release_needed=false" >> "$GITHUB_OUTPUT"
            echo "${TAG_NAME} is already published." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          TAG_COMMIT="$(git rev-list -n 1 "${TAG_NAME}" 2>/dev/null || true)"
          if [ -n "${TAG_COMMIT}" ] && [ "${TAG_COMMIT}" != "${GITHUB_SHA}" ]; then
            echo "Tag ${TAG_NAME} already points to ${TAG_COMMIT}, not ${GITHUB_SHA}." >&2
            echo "Rerun the failed workflow for ${TAG_COMMIT} or advance the package version." >&2
            exit 1
          fi

          echo "release_needed=true" >> "$GITHUB_OUTPUT"
          echo "tag_exists=$([ -n "${TAG_COMMIT}" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"

  github-release:
    needs: release-state
    if: needs.release-state.outputs.release_needed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Pluxx CLI is available
        run: npx pluxx --version

      - name: Run Pluxx source diagnostics
        run: npx pluxx doctor

      - name: Run release checks
        run: npm run release:check

      - name: Diagnose built host bundles
        env:
          SENDLENS_INSTANTLY_API_KEY: ci-placeholder
        run: |
          npx pluxx doctor --consumer ./dist/claude-code
          npx pluxx doctor --consumer ./dist/cursor
          npx pluxx doctor --consumer ./dist/codex
          npx pluxx doctor --consumer ./dist/opencode

      - name: Dry-run GitHub release assets with Pluxx
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx pluxx publish --github-release --dry-run --version "${{ needs.release-state.outputs.package_version }}"

      - name: Create release tag
        if: needs.release-state.outputs.tag_exists == 'false'
        run: |
          git tag "${{ needs.release-state.outputs.tag_name }}" "${GITHUB_SHA}"
          git push origin "${{ needs.release-state.outputs.tag_name }}"

      - name: Publish GitHub release assets with Pluxx
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npx pluxx publish --github-release --version "${{ needs.release-state.outputs.package_version }}"
