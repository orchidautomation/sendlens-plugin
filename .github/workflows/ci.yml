name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

permissions:
  contents: read

jobs:
  plugin-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run CI checks
        run: npm run ci:plugin

      - name: Upload built bundles
        uses: actions/upload-artifact@v4
        with:
          name: sendlens-dist
          path: dist
          if-no-files-found: error
