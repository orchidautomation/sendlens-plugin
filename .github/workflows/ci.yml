name: CI

on:
  push:
    branches:
      - main
      - codex/**
  pull_request:

permissions:
  contents: read

jobs:
  plugin-checks:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify Pluxx CLI is available
        run: npx pluxx --version

      - name: Run Pluxx source diagnostics
        run: npx pluxx doctor

      - name: Run CI checks
        run: npm run ci:plugin

      - name: Run Pluxx target smoke checks
        run: npx pluxx test --target claude-code cursor codex opencode

      - name: Diagnose built host bundles
        env:
          SENDLENS_INSTANTLY_API_KEY: ci-placeholder
        run: |
          npx pluxx doctor --consumer ./dist/claude-code
          npx pluxx doctor --consumer ./dist/cursor
          npx pluxx doctor --consumer ./dist/codex
          npx pluxx doctor --consumer ./dist/opencode

      - name: Upload built bundles
        uses: actions/upload-artifact@v4
        with:
          name: sendlens-dist
          path: dist
          if-no-files-found: error
