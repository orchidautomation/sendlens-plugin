<svg width="1600" height="980" viewBox="0 0 1600 980" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="980" fill="#08111C"/>
  <rect x="40" y="42" width="1520" height="896" rx="30" fill="#0B1220" stroke="#1E293B"/>
  <rect x="40" y="42" width="1520" height="64" rx="30" fill="#0F172A"/>
  <circle cx="84" cy="74" r="8" fill="#F97316"/>
  <circle cx="112" cy="74" r="8" fill="#FBBF24"/>
  <circle cx="140" cy="74" r="8" fill="#22C55E"/>
  <text x="184" y="82" fill="#93C5FD" font-size="24" font-family="IBM Plex Mono, Menlo, monospace">SendLens · analysis starters</text>

  <rect x="84" y="148" width="480" height="738" rx="24" fill="#F8FAFC"/>
  <text x="118" y="208" fill="#0F172A" font-size="40" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Recipe topics</text>
  <rect x="118" y="248" width="412" height="70" rx="16" fill="#DBEAFE"/>
  <text x="146" y="292" fill="#1E3A8A" font-size="26" font-weight="700" font-family="IBM Plex Sans, Arial, sans-serif">campaign-performance</text>
  <rect x="118" y="338" width="412" height="70" rx="16" fill="#E2E8F0"/>
  <text x="146" y="382" fill="#334155" font-size="26" font-family="IBM Plex Sans, Arial, sans-serif">workspace-health</text>
  <rect x="118" y="428" width="412" height="70" rx="16" fill="#E2E8F0"/>
  <text x="146" y="472" fill="#334155" font-size="26" font-family="IBM Plex Sans, Arial, sans-serif">copy-analysis</text>
  <rect x="118" y="518" width="412" height="70" rx="16" fill="#E2E8F0"/>
  <text x="146" y="562" fill="#334155" font-size="26" font-family="IBM Plex Sans, Arial, sans-serif">reply-patterns</text>
  <rect x="118" y="608" width="412" height="70" rx="16" fill="#E2E8F0"/>
  <text x="146" y="652" fill="#334155" font-size="26" font-family="IBM Plex Sans, Arial, sans-serif">icp-signals</text>
  <rect x="118" y="698" width="412" height="70" rx="16" fill="#E2E8F0"/>
  <text x="146" y="742" fill="#334155" font-size="26" font-family="IBM Plex Sans, Arial, sans-serif">tags</text>

  <rect x="606" y="148" width="910" height="738" rx="24" fill="#0F172A" stroke="#1D4ED8"/>
  <text x="640" y="208" fill="#F8FAFC" font-size="40" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Variant winners by campaign</text>
  <text x="640" y="248" fill="#7DD3FC" font-size="24" font-family="IBM Plex Sans, Arial, sans-serif">Exact query recipe</text>

  <rect x="640" y="284" width="842" height="426" rx="18" fill="#08111C"/>
  <text x="670" y="332" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">SELECT sa.campaign_id, c.name AS campaign_name, sa.step, sa.variant,</text>
  <text x="670" y="368" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">  sa.sent, sa.unique_replies,</text>
  <text x="670" y="404" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">  ROUND(100.0 * sa.unique_replies / NULLIF(sa.sent, 0), 2)</text>
  <text x="670" y="440" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">    AS unique_reply_rate_pct, sa.bounces,</text>
  <text x="670" y="476" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">  cv.subject</text>
  <text x="670" y="512" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">FROM sendlens.step_analytics sa</text>
  <text x="670" y="548" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">JOIN sendlens.campaigns c ON sa.workspace_id = c.workspace_id</text>
  <text x="670" y="584" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">LEFT JOIN sendlens.campaign_variants cv ON ...</text>
  <text x="670" y="620" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">ORDER BY unique_reply_rate_pct DESC NULLS LAST, sa.sent DESC;</text>

  <rect x="640" y="742" width="842" height="110" rx="18" fill="#0C4A6E"/>
  <text x="672" y="790" fill="#F8FAFC" font-size="24" font-weight="700" font-family="IBM Plex Sans, Arial, sans-serif">Why this exists</text>
  <text x="672" y="824" fill="#E0F2FE" font-size="22" font-family="IBM Plex Sans, Arial, sans-serif">The agent can answer common questions from known-good SQL before improvising.</text>
</svg>
