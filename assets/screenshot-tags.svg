  <text x="118" y="648" fill="#0F172A" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">sendlens.custom_tag_mappings</text>

  <rect x="574" y="148" width="942" height="738" rx="24" fill="#0F172A" stroke="#0F766E"/>
  <text x="608" y="208" fill="#F8FAFC" font-size="40" font-weight="700" font-family="Avenir Next, Helvetica Neue, Arial, sans-serif">Sampled leads by tag</text>
  <text x="608" y="248" fill="#67E8F9" font-size="24" font-family="IBM Plex Sans, Arial, sans-serif">Hybrid recipe: exact mappings joined to sampled lead evidence</text>

  <rect x="608" y="286" width="874" height="184" rx="18" fill="#08111C"/>
  <text x="638" y="334" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">SELECT COALESCE(t.label, t.name) AS tag_name, sl.campaign_id,</text>
  <text x="638" y="370" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">  COUNT(*) AS sampled_lead_count,</text>
  <text x="638" y="406" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">  ROUND(100.0 * SUM(CASE WHEN sl.email_reply_count &gt; 0 THEN 1 ELSE 0 END)</text>
  <text x="638" y="442" fill="#CBD5E1" font-size="22" font-family="IBM Plex Mono, Menlo, monospace">    / NULLIF(COUNT(*), 0), 2) AS sampled_reply_share_pct ...</text>

